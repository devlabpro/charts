{{- if .Values.extraObjects }}
{{- range .Values.extraObjects }}
---
apiVersion: {{ .apiVersion }}
kind: {{ .kind }}
metadata:
  {{- with .metadata }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
  labels:
    {{- include "mychart.labels" $ | nindent 4 }}
spec:
  {{- toYaml .spec | nindent 2 }}
{{- end }}
{{- end }}
